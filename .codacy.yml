---
exclude_paths:
  - "Manifest.toml"
  - ".mimocode/**"
  - ".codex/**"
  - "test/**"
  # AGENTS.md is agent-facing instructions, not code — Codacy's AGENTS.md analyzer
  # flags false positives (no persona, no tools section, no priority markers)
  - "AGENTS.md"

# Codacy tool settings use the top-level `engines` key (not `plugins`).
# See https://docs.codacy.com/repositories-configure/codacy-configuration-file/
engines:
  alex:
    enabled: true
  misspellings:
    enabled: true
  markdownlint:
    enabled: true
    config:
      MD013:
        enabled: false
      # Keep a Changelog repeats ### Added / ### Changed under each version.
      # siblings_only: allow across parents; still flag same-section duplicates.
      MD024:
        siblings_only: true
      MD033:
        enabled: false
      MD041:
        enabled: false
