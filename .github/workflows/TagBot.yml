name: TagBot
on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot'
    runs-on: ubuntu-latest
    steps:
      - uses: JuliaRegistries/TagBot@14d7645453716d7a2f09b1da0504a024f97462a1 # v1.25.10
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Optional: SSH deploy key so tags that touch workflow files (or docs
          # deploys) can trigger other Actions. Add DOCUMENTER_KEY if needed.
          # See: https://github.com/JuliaRegistries/TagBot#ssh-deploy-keys
          ssh: ${{ secrets.DOCUMENTER_KEY }}
